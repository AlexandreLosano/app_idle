services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-idle_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idle_pass}
      POSTGRES_DB: ${POSTGRES_DB:-idle_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-idle_user} -d ${POSTGRES_DB:-idle_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-idle_user}:${POSTGRES_PASSWORD:-idle_pass}@db:5432/${POSTGRES_DB:-idle_db}
      PORT: ${BACKEND_PORT:-3000}
      NODE_ENV: development
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${BACKEND_PORT:-3000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}
      VITE_PROD_IP: ${VITE_PROD_IP}
      VITE_PORT: ${FRONTEND_PORT:-5173}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
