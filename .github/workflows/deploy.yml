name: Deploy PRD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy PRD
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.0.10
          username: alosano
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/repos/app_idle
            git pull origin main
            docker compose -p app_idle_prd down --remove-orphans
            docker compose -p app_idle_prd up -d --build
